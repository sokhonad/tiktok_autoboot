version: "3.9"

services:
  tiktok-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tiktok-autobot
    restart: always

    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - TIKTOK_COOKIES_PATH=/app/cookies.json
      - PYTHONUNBUFFERED=1

    volumes:
      # Vidéos générées — persistantes sur l'hôte
      - ./output:/app/output
      # Logs — visibles depuis l'hôte
      - ./logs:/app/logs
      # Assets (backgrounds, musiques)
      - ./assets:/app/assets
      # Cookies TikTok — montés en lecture seule
      - ./cookies.json:/app/cookies.json:ro
      # Cache faster-whisper / HuggingFace — évite le re-téléchargement du modèle
      - whisper_cache:/root/.cache/huggingface

    # Lance cron en foreground (planifie main.py toutes les 3h)
    command: cron -f

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  whisper_cache:
    driver: local
